name: 'Skill Audit'
description: >-
  Grade your Claude Agent Skills against the Anthropic gold standard and the
  crawled ecosystem corpus, and post the report as a pull-request comment.
author: 'skill-map'
branding:
  icon: 'check-circle'
  color: 'purple'

inputs:
  path:
    description: 'Directory to scan for SKILL.md files (defaults to the repo root).'
    required: false
    default: '.'
  token:
    description: >-
      GitHub token used to post the PR comment (and to read private repos if
      auditing remotely). Defaults to the workflow token.
    required: false
    default: ${{ github.token }}
  skill-map-ref:
    description: 'Ref of dhk/skill-map to pull the scorer + corpus from.'
    required: false
    default: 'main'
  comment:
    description: 'Post/update a PR comment with the report (true/false).'
    required: false
    default: 'true'
  fail-under:
    description: >-
      Fail the check if median quality is below this score (0 disables, the
      default — the audit is advisory, not a hard gate, until you opt in).
    required: false
    default: '0'

outputs:
  median-quality:
    description: 'Median quality score (0-100) of the audited skills.'
    value: ${{ steps.audit.outputs.median }}
  signature:
    description: 'Detected repo signature.'
    value: ${{ steps.audit.outputs.signature }}
  report-path:
    description: 'Path to the generated Markdown report.'
    value: ${{ steps.audit.outputs.report }}

runs:
  using: 'composite'
  steps:
    - name: Check out skill-map tooling
      uses: actions/checkout@v4
      with:
        repository: dhk/skill-map
        ref: ${{ inputs.skill-map-ref }}
        path: .skill-map-tooling

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      shell: bash
      run: pip install --quiet pyyaml

    - name: Run audit
      id: audit
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.token }}
      run: |
        TOOL=.skill-map-tooling
        REPORT="$RUNNER_TEMP/skill-audit.md"
        JSON="$RUNNER_TEMP/skill-audit.json"

        python "$TOOL/crawlers/audit_repo.py" "${{ inputs.path }}" \
          --out "$REPORT"
        python "$TOOL/crawlers/audit_repo.py" "${{ inputs.path }}" \
          --json > "$JSON" || true

        if [ ! -s "$REPORT" ]; then
          echo "No SKILL.md files found under '${{ inputs.path }}'." | tee "$REPORT"
          echo "median=" >> "$GITHUB_OUTPUT"
          echo "signature=none" >> "$GITHUB_OUTPUT"
          echo "report=$REPORT" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        MEDIAN=$(python -c "import json,sys; print(json.load(open('$JSON')).get('median_quality',''))" 2>/dev/null || echo "")
        SIG=$(python -c "import json,sys; print(json.load(open('$JSON')).get('signature',''))" 2>/dev/null || echo "")
        echo "median=$MEDIAN" >> "$GITHUB_OUTPUT"
        echo "signature=$SIG" >> "$GITHUB_OUTPUT"
        echo "report=$REPORT" >> "$GITHUB_OUTPUT"

        {
          echo "## Skill Audit"
          cat "$REPORT"
        } >> "$GITHUB_STEP_SUMMARY"

    - name: Post PR comment
      if: inputs.comment == 'true' && github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        github-token: ${{ inputs.token }}
        script: |
          const fs = require('fs');
          const marker = '<!-- skill-audit-comment -->';
          const body = marker + '\n' +
            fs.readFileSync(process.env.REPORT_PATH, 'utf8') +
            '\n\n<sub>🤖 Generated by [skill-audit](https://github.com/dhk/skill-map). ' +
            'Run it locally: `python crawlers/audit_repo.py <path>`</sub>';
          const { owner, repo } = context.repo;
          const issue_number = context.issue.number;
          const { data: comments } = await github.rest.issues.listComments({
            owner, repo, issue_number, per_page: 100 });
          const existing = comments.find(c => c.body && c.body.includes(marker));
          if (existing) {
            await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
          } else {
            await github.rest.issues.createComment({ owner, repo, issue_number, body });
          }
      env:
        REPORT_PATH: ${{ steps.audit.outputs.report }}

    - name: Enforce quality floor
      if: inputs.fail-under != '0'
      shell: bash
      run: |
        MEDIAN="${{ steps.audit.outputs.median }}"
        FLOOR="${{ inputs.fail-under }}"
        if [ -z "$MEDIAN" ]; then
          echo "No skills audited; nothing to enforce."
          exit 0
        fi
        awk -v m="$MEDIAN" -v f="$FLOOR" 'BEGIN {
          if (m + 0 < f + 0) {
            printf("Median quality %.1f is below the required %.1f\n", m, f);
            exit 1;
          }
          printf("Median quality %.1f meets the floor of %.1f\n", m, f);
        }'
